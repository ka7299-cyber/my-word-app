<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA 單字大師 - 拼字加強版</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #673ab7;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --syllable-1: #e74c3c; /* 紅色音節 */
            --syllable-2: #3498db; /* 藍色音節 */
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); min-height: 95vh; display: flex; flex-direction: column; }
        
        /* 標題與控制項 */
        .header { padding: 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 100; border-radius: 20px 20px 0 0; }
        h1 { margin: 0 0 15px 0; font-size: 22px; color: var(--primary); text-align: center; letter-spacing: 1px; }
        
        .search-box { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; transition: 0.3s; }
        .search-box:focus { border-color: var(--primary); outline: none; }
        
        .nav-row { display: flex; gap: 8px; margin-bottom: 10px; }
        select { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
        .btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 14px; }
        .btn-test { background: var(--secondary); color: white; flex: 1; }
        .btn-test:hover { opacity: 0.9; }

        /* 單字列表樣式 */
        #list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .word-card { background: white; border: 1px solid #f0f0f0; border-radius: 15px; padding: 15px; margin-bottom: 12px; transition: 0.2s; }
        .word-card:hover { border-color: #d1d9e6; transform: translateY(-2px); }
        
        .syllable-display { font-size: 24px; font-weight: 800; margin-bottom: 5px; letter-spacing: 0.5px; }
        .syl-0 { color: var(--syllable-1); }
        .syl-1 { color: var(--syllable-2); }
        
        .ipa-text { color: #888; font-size: 14px; font-family: serif; margin-bottom: 8px; }
        .meaning-text { font-size: 16px; color: #444; margin-bottom: 10px; padding-top: 5px; border-top: 1px dashed #eee; }
        
        .voice-controls { display: flex; gap: 8px; }
        .btn-v { background: #f0f2f5; color: #555; padding: 6px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .btn-v:active { background: #e2e6ea; }

        /* 測驗區域樣式 */
        #test-area { padding: 30px 20px; text-align: center; }
        .quiz-progress { font-size: 14px; color: #999; margin-bottom: 20px; }
        .quiz-meaning { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .quiz-ipa { color: #aaa; margin-bottom: 30px; font-size: 18px; }
        
        .spell-input { width: 100%; padding: 15px; font-size: 24px; border: 3px solid #eee; border-radius: 15px; text-align: center; margin-bottom: 20px; box-sizing: border-box; text-transform: lowercase; }
        .spell-input:focus { border-color: var(--secondary); outline: none; }
        
        .feedback { font-size: 18px; font-weight: bold; margin-bottom: 20px; min-height: 27px; }
        .correct { color: var(--success); }
        .wrong { color: var(--error); }

        .hidden { display: none; }
        .result-score { font-size: 60px; font-weight: 900; color: var(--secondary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-header" class="header">
        <h1>OPA VOCABULARY</h1>
        <input type="text" id="search-input" class="search-box" placeholder="搜尋單字或中文..." oninput="handleSearch()">
        <div class="nav-row">
            <select id="level-select" onchange="loadLevel()">
                <script>
                    for(let i=1; i<=12; i++) document.write(`<option value="${i}">Level ${i}</option>`);
                </script>
            </select>
            <button class="btn btn-test" onclick="startQuiz(10)">隨機 10 題</button>
            <button class="btn btn-test" style="background:var(--primary)" onclick="startQuiz(0)">全部測驗</button>
        </div>
    </div>

    <div id="list-container"></div>

    <div id="test-area" class="hidden">
        <div class="quiz-progress" id="quiz-progress">第 1 / 10 題</div>
        <div class="quiz-meaning" id="quiz-meaning">中文意思</div>
        <div class="quiz-ipa" id="quiz-ipa">/ipa/</div>
        
        <input type="text" id="spell-input" class="spell-input" placeholder="請輸入單字..." autocomplete="off" onkeyup="handleEnter(event)">
        
        <div id="feedback" class="feedback"></div>
        
        <div class="voice-controls" style="justify-content: center; margin-bottom: 30px;">
            <button class="btn-v" id="btn-listen" onclick="replayVoice()">🔊 聽讀音</button>
        </div>

        <button class="btn" style="background:#95a5a6; color:white; width:100px" onclick="exitQuiz()">退出</button>
    </div>
</div>

<script src="words.js"></script>
<script>
    let currentLevelWords = [];
    let quizQueue = [];
    let currentIdx = 0;
    let score = 0;
    let isLocked = false; // 防止連續跳題

    window.onload = () => { loadLevel(); };

    // 1. 載入當前等級單字
    function loadLevel() {
        const lv = parseInt(document.getElementById('level-select').value);
        currentLevelWords = allWords.filter(w => w.level === lv);
        renderList(currentLevelWords);
    }

    // 2. 搜尋邏輯
    function handleSearch() {
        const term = document.getElementById('search-input').value.toLowerCase();
        if(!term) { renderList(currentLevelWords); return; }
        const filtered = allWords.filter(w => w.word.toLowerCase().includes(term) || w.meaning.includes(term));
        renderList(filtered.slice(0, 50));
    }

    // 3. 音節分色 HTML 產生
    function getSyllableHTML(wordObj) {
        const syls = wordObj.syllables || [wordObj.word];
        return syls.map((s, i) => `<span class="syl-${i % 2}">${s}</span>`).join('');
    }

    // 4. 渲染列表
    function renderList(words) {
        const container = document.getElementById('list-container');
        container.innerHTML = words.length ? "" : "<p style='text-align:center; margin-top:50px; color:#999'>查無單字</p>";
        
        words.forEach(w => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerHTML = `
                <div class="syllable-display">${getSyllableHTML(w)}</div>
                <div class="ipa-text">${w.ipa || ''}</div>
                <div class="meaning-text">${w.meaning}</div>
                <div class="voice-controls">
                    <button class="btn-v" onclick="speak('${w.word}', 1)">🔊 快速</button>
                    <button class="btn-v" onclick="speakSyllables(${JSON.stringify(w.syllables || [w.word])})">🐢 慢速</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 5. 語音功能
    function speak(text, rate) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = rate;
        window.speechSynthesis.speak(msg);
    }

    function speakSyllables(arr) {
        window.speechSynthesis.cancel();
        let delay = 0;
        arr.forEach(s => {
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance(s);
                msg.lang = 'en-US';
                msg.rate = 0.6;
                window.speechSynthesis.speak(msg);
            }, delay);
            delay += 900;
        });
    }

    // 6. 測驗邏輯核心
    function startQuiz(count) {
        if(currentLevelWords.length === 0) return;
        
        // 隨機洗牌
        let pool = [...currentLevelWords].sort(() => Math.random() - 0.5);
        
        // 決定題數 (count 為 0 代表全部)
        quizQueue = (count > 0) ? pool.slice(0, count) : pool;
        currentIdx = 0;
        score = 0;

        document.getElementById('home-header').classList.add('hidden');
        document.getElementById('list-container').classList.add('hidden');
        document.getElementById('test-area').classList.remove('hidden');
        
        showNextQuestion();
    }

    function showNextQuestion() {
        if(currentIdx >= quizQueue.length) { showFinalResult(); return; }
        
        isLocked = false;
        const item = quizQueue[currentIdx];
        const input = document.getElementById('spell-input');
        
        document.getElementById('quiz-progress').innerText = `第 ${currentIdx + 1} / ${quizQueue.length} 題`;
        document.getElementById('quiz-meaning').innerText = item.meaning;
        document.getElementById('quiz-ipa').innerText = item.ipa || '';
        document.getElementById('feedback').innerText = '';
        input.value = '';
        input.focus();
        
        // 自動念一次單字
        speak(item.word, 0.8);
    }

    function handleEnter(e) {
        if(e.key === 'Enter') checkSpelling();
    }

    function checkSpelling() {
        if(isLocked) return;
        
        const input = document.getElementById('spell-input');
        const userValue = input.value.trim().toLowerCase();
        const correctAnswer = quizQueue[currentIdx].word.toLowerCase();
        const feedback = document.getElementById('feedback');

        isLocked = true;
        if(userValue === correctAnswer) {
            score++;
            feedback.innerHTML = `<span class="correct">正確！很好！</span>`;
            setTimeout(() => {
                currentIdx++;
                showNextQuestion();
            }, 800);
        } else {
            feedback.innerHTML = `<span class="wrong">錯誤！答案是: <b>${correctAnswer}</b></span>`;
            speak(correctAnswer, 0.7);
            setTimeout(() => {
                currentIdx++;
                showNextQuestion();
            }, 2500); // 錯了停久一點讓人看清楚
        }
    }

    function replayVoice() {
        const item = quizQueue[currentIdx];
        speak(item.word, 0.7);
    }

    function showFinalResult() {
        document.getElementById('test-area').innerHTML = `
            <div style="padding:40px 0">
                <h2>測驗完成 🎉</h2>
                <div class="result-score">${score} / ${quizQueue.length}</div>
                <p>繼續加油，你是最棒的！</p>
                <button class="btn btn-test" style="width:100%; margin-top:30px; height:50px" onclick="location.reload()">回到單字表</button>
            </div>
        `;
    }

    function exitQuiz() {
        if(confirm("確定要放棄測驗嗎？")) location.reload();
    }
</script>

</body>
</html>
