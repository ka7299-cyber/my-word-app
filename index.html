<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA 單字助手</title>
    <link rel="manifest" href="manifest.json">
    <script src="words.js"></script>
    <style>
        :root { --p: #6c5ce7; --bg: #f4f7f6; --card: #ffffff; --quiz: #ff7675; --warn: #fdcb6e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .page { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: white; }
        .hidden { display: none !important; }
        #level-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; margin-top: 20px; }
        .btn-lvl { aspect-ratio: 1/1; background: white; border: 2px solid #eee; border-radius: 16px; font-weight: bold; color: #555; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn-lvl:active { transform: scale(0.95); border-color: var(--p); color: var(--p); }
        .s0 { color: #ff7675; font-weight: 800; } .s1 { color: #0984e3; font-weight: 800; } 
        .s2 { color: #00b894; font-weight: 800; } .s3 { color: #e17055; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; text-align: left; }
        .card { background: var(--card); width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; box-sizing: border-box; min-height: 220px; display:flex; flex-direction:column; justify-content:center; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-q { background: var(--quiz); color: white; width: 100%; }
        .btn-w { background: var(--warn); color: white; width: 100%; }
        .btn-mini { padding: 10px; font-size: 1.1rem; background: #f0f0f0; border-radius: 8px; border:none; cursor:pointer; min-width: 44px; }
        .syllable-display { font-size: 2.6rem; margin: 10px 0; }
        input { width: 100%; padding: 15px; font-size: 1.4rem; border: 2px solid var(--p); border-radius: 12px; text-align: center; margin-top: 10px; box-sizing: border-box; outline: none; }
        #progress-bar { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-bottom: 15px; overflow: hidden; display:none; }
        #progress-inner { height: 100%; background: var(--p); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="page-home" class="page">
        <h2 style="color:var(--p); margin-top: 40px;">OPA 單字助手</h2>
        <div id="level-menu"></div>
    </div>
    <div id="page-list" class="page hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom: 15px;">
            <button class="btn-mini" onclick="goHome()">⬅</button>
            <h3 id="current-lvl-title" style="color:var(--p); margin:0;"></h3>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:100%; margin-bottom:15px;">
            <button class="btn btn-p" onclick="startMode('study')">學習 📖</button>
            <button class="btn btn-q" onclick="startMode('quiz')">測驗 ✍️</button>
        </div>
        <table><tbody id="list-body"></tbody></table>
    </div>
    <div id="page-main" class="page hidden">
        <div id="progress-bar"><div id="progress-inner"></div></div>
        <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
            <button class="btn-mini" onclick="goBackToList()">⬅</button>
            <div id="word-count" style="font-size:0.85rem; color:#999;"></div>
        </div>
        <div id="quiz-container">
            <div class="card" style="margin-top:15px;">
                <div id="mode-label" style="font-size: 0.8rem; color: #999; font-weight:bold;"></div>
                <div id="word-display" class="syllable-display"></div>
                <div id="ipa-display" style="color: #b2bec3;"></div>
                <div id="meaning-display" style="font-size: 1.4rem; margin: 15px 0;"></div>
                <input type="text" id="quiz-input" class="hidden" placeholder="拼寫單字...">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px;">
                <button class="btn btn-p" style="background:#8e8eef" onclick="playCurrent('normal')">正常 🔊</button>
                <button class="btn btn-p" style="background:#8e8eef" onclick="playCurrent('slow')">慢速 🐢</button>
                <button id="check-btn" class="btn btn-q hidden" style="grid-column: span 2; padding:18px;" onclick="checkAnswer()">檢查答案 ✅</button>
                <button id="skip-btn" class="btn btn-w hidden" style="grid-column: span 2;" onclick="skipWord()">這題不會 🏳️</button>
                <div id="nav-btns" style="display:contents;">
                    <button class="btn-mini" onclick="move(-1)">上一個</button>
                    <button class="btn-mini" onclick="move(1)">下一個</button>
                </div>
            </div>
        </div>
        <div id="result-container" class="hidden" style="text-align:center; width:100%;">
            <h2 id="result-title" style="margin-top:30px;">測驗結束！</h2>
            <div id="result-stats" style="font-size:1.2rem; margin:20px 0;"></div>
            <button id="retry-wrong-btn" class="btn btn-q" onclick="retryWrong()">再測驗錯題 ✍️</button>
            <button class="btn btn-p" style="margin-top:10px;" onclick="goBackToList()">返回列表 📋</button>
        </div>
    </div>
    <script>
        let currentLevelWords = [], quizPool = [], wrongWords = [], idx = 0, isQuizMode = false, synth = window.speechSynthesis;
        const levelMenu = document.getElementById('level-menu');
        for(let i=1; i<=12; i++) levelMenu.innerHTML += `<button class="btn-lvl" onclick="selectLevel(${i})">L${i}</button>`;
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
        function speak(t, r = 1) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = r; synth.speak(u); }
        function speakSyllables(s) { synth.cancel(); s.forEach((v, i) => { const u = new SpeechSynthesisUtterance(v); u.lang = 'en-US'; u.rate = 0.5; setTimeout(() => synth.speak(u), i * 950); }); }
        function selectLevel(l) { speak(" ", 1); currentLevelWords = allWords.filter(w => w.level === l); if(currentLevelWords.length === 0) { alert(`Level ${l} 尚無資料`); return; } document.getElementById('current-lvl-title').innerText = `Level ${l}`; renderList(); showPage('page-list'); }
        function renderList() { const b = document.getElementById('list-body'); b.innerHTML = ''; currentLevelWords.forEach((item, i) => { let c = item.syllables.map((s, j) => `<span class="s${j%4}">${s}</span>`).join(''); b.innerHTML += `<tr><td><div>${c}</div><button class="btn-mini" onclick="playFromList(${i}, 'normal')">🔊</button> <button class="btn-mini" onclick="playFromList(${i}, 'slow')">🐢</button></td><td><div style="font-weight:bold">${item.meaning}</div><small>${item.ipa}</small></td></tr>`; }); }
        function playFromList(i, m) { const t = currentLevelWords[i]; if (m === 'normal') speak(t.word, 0.9); else speakSyllables(t.syllables); }
        function startMode(m) { idx = 0; wrongWords = []; isQuizMode = (m === 'quiz'); quizPool = isQuizMode ? shuffle([...currentLevelWords]) : [...currentLevelWords]; document.getElementById('quiz-container').classList.remove('hidden'); document.getElementById('result-container').classList.add('hidden'); showPage('page-main'); render(); if(isQuizMode) setTimeout(() => playCurrent('normal'), 500); }
        function render() { const item = quizPool[idx], w = document.getElementById('word-display'), m = document.getElementById('meaning-display'), i = document.getElementById('ipa-display'), q = document.getElementById('quiz-input'), c = document.getElementById('check-btn'), s = document.getElementById('skip-btn'), n = document.getElementById('nav-btns'), p = document.getElementById('progress-bar'); w.innerHTML = ''; q.value = ''; document.getElementById('word-count').innerText = `${idx + 1} / ${quizPool.length}`; if (!isQuizMode) { document.getElementById('mode-label').innerText = "📖 學習模式"; p.style.display = 'none'; item.syllables.forEach((v, k) => { w.innerHTML += `<span class="s${k%4}">${v}</span>`; }); i.innerText = item.ipa; m.innerText = item.meaning; q.classList.add('hidden'); c.classList.add('hidden'); s.classList.add('hidden'); n.classList.remove('hidden'); } else { document.getElementById('mode-label').innerText = "✍️ 隨機測驗"; p.style.display = 'block'; document.getElementById('progress-inner').style.width = `${(idx / quizPool.length) * 100}%`; w.innerText = "???"; i.innerText = ""; m.innerText = "請聽音拼寫"; q.classList.remove('hidden'); c.classList.remove('hidden'); s.classList.remove('hidden'); n.classList.add('hidden'); q.focus(); } }
        function playCurrent(m) { const t = quizPool[idx]; if (m === 'normal') speak(t.word, 0.9); else speakSyllables(t.syllables); }
        function checkAnswer() { const u = document.getElementById('quiz-input').value.toLowerCase().trim(), c = quizPool[idx].word.toLowerCase(); if (u === c) nextWord(); else { if (!wrongWords.includes(quizPool[idx])) wrongWords.push(quizPool[idx]); alert("❌ 再聽一遍！"); playCurrent('slow'); } }
        function skipWord() { if (!wrongWords.includes(quizPool[idx])) wrongWords.push(quizPool[idx]); nextWord(); }
        function nextWord() { if (idx === quizPool.length - 1) showFinalResult(); else { idx++; render(); if(isQuizMode) setTimeout(() => playCurrent('normal'), 400); } }
        function showFinalResult() { document.getElementById('quiz-container').classList.add('hidden'); document.getElementById('result-container').classList.remove('hidden'); document.getElementById('progress-bar').style.display = 'none'; const t = quizPool.length, w = wrongWords.length, c = t - w; document.getElementById('result-stats').innerHTML = `<p>完成總數：${t}</p><p style="color:#00b894">一次答對：${c}</p><p style="color:#ff7675">錯題/放棄：${w}</p>`; document.getElementById('retry-wrong-btn').style.display = (w > 0) ? 'block' : 'none'; }
        function retryWrong() { quizPool = shuffle([...wrongWords]); wrongWords = []; idx = 0; isQuizMode = true; document.getElementById('quiz-container').classList.remove('hidden'); document.getElementById('result-container').classList.add('hidden'); render(); setTimeout(() => playCurrent('normal'), 500); }
        function move(s) { idx = (idx + s + quizPool.length) % quizPool.length; render(); }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function goHome() { showPage('page-home'); }
        function goBackToList() { isQuizMode = false; showPage('page-list'); }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
