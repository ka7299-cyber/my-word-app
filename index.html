<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPA 單字練習器</title>
    <link rel="stylesheet" href="style.css"> <style>
        :root { --primary: #4a90e2; --success: #28a745; --bg: #f5f7fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-quick { background: var(--success); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #display-area, #test-area { margin-top: 20px; }
        .word-card { padding: 15px; border-bottom: 1px solid #eee; animation: fadeIn 0.3s; }
        .word-card:last-child { border-bottom: none; }
        .word-text { font-size: 20px; font-weight: bold; color: var(--primary); }
        .ipa { color: #666; font-size: 14px; margin-left: 10px; }
        .meaning { display: block; margin-top: 5px; color: #444; }

        .quiz-card { text-align: center; padding: 30px 10px; }
        .quiz-question { font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; background: white; text-align: left; font-size: 18px; }
        .option-btn:active { background: #f0f0f0; }
        .progress { text-align: center; color: #888; font-size: 14px; margin-bottom: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>OPA Vocab</h1>

    <div class="controls">
        <input type="text" id="search-input" placeholder="🔍 搜尋單字或中文..." oninput="handleSearch()">
        
        <select id="level-select" onchange="loadLevel()">
            <option value="1">Level 1</option><option value="2">Level 2</option>
            <option value="3">Level 3</option><option value="4">Level 4</option>
            <option value="5">Level 5</option><option value="6">Level 6</option>
            <option value="7">Level 7</option><option value="8">Level 8</option>
            <option value="9">Level 9</option><option value="10">Level 10</option>
            <option value="11">Level 11</option><option value="12">Level 12</option>
        </select>

        <div class="btn-group">
            <button class="btn-main" onclick="startTest('full')">完整測驗</button>
            <button class="btn-quick" onclick="startTest('quick')">快速抽測 10 題</button>
        </div>
    </div>

    <div id="display-area"></div>

    <div id="test-area" class="hidden"></div>
</div>

<script src="words.js"></script>
<script src="script.js"></script>

</body>
</html>
